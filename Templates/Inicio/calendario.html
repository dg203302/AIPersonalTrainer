<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="/Scripts/ui_transparencia_apply.js"></script>
    <script src="/Scripts/ui_idioma.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/Styles/styles_dashboard.css">
    <link rel="stylesheet" href="/Styles/styles_ayuda.css">
    <meta name="theme-color" content="#0c0d0f">
    <title data-i18n-en="Calendar">Calendario</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7232324434042202"
        crossorigin="anonymous"></script>

    <style>
        section{
            background: transparent !important;
        }
        * {
            -webkit-tap-highlight-color: transparent !important;
            -webkit-tap-highlight-color: rgba(0,0,0,0) !important;
            outline: none !important;
        }

        *:focus {
            outline: none !important;
        }
        /* ── Material You override layer (Dashboard only) ───────────── */
        :root {
            --my-primary: #bce4ff;
            --my-primary-dim: rgba(208, 188, 255, 0.14);
            --my-primary-rim: rgba(208, 188, 255, 0.22);
            --my-danger: #f2b8b5;
            --my-danger-dim: rgba(242, 184, 181, 0.10);
            --my-danger-rim: rgba(242, 184, 181, 0.22);
            --my-glass: rgba(255, 255, 255, 0.05);
            --my-glass-rim: rgba(255, 255, 255, 0.10);
            --my-glass-hover: rgba(255, 255, 255, 0.08);
            --my-radius-card: 26px;
            --my-radius-sm: 16px;
            --my-radius-pill: 999px;
        }
        main{
            margin: 0px;
            padding: 24px 16px;
        }

        /* Hacer que el calendario ocupe el alto disponible (móvil y escritorio) */
        html, body { height: 100%; }

        /* Desktop / tablet: dar al calendario una altura mínima que llene la ventana
           restando header/footer (ajustable por variables CSS). */
        #calendario {
            min-height: calc(100vh - var(--header-fixed, 56px) - var(--footer-fixed, 56px) - 48px);
            height: auto;
            overflow: auto;
            border-radius: var(--my-radius-sm);
            border: 1px solid var(--my-glass-rim);
            background: var(--my-glass);
            padding: 8px;
        }

        @media (max-width: 900px) {
            main {
                padding: 12px 12px;
                min-height: calc(100vh - var(--header-fixed, 56px) - var(--footer-fixed, 56px));
                display: flex;
                flex-direction: column;
            }

            #calendario {
                flex: 1 1 auto;
                height: 100%;
                min-height: 0;
                overflow: auto;
                border-radius: var(--my-radius-sm);
                border: 1px solid var(--my-glass-rim);
                background: var(--my-glass);
                padding: 8px;
            }

            /* Asegurar que FullCalendar y sus contenedores internos se estiren */
            .fc, .fc .fc-view-harness, .fc-scroller {
                height: 100% !important;
                min-height: 0 !important;
            }
        }
        /* Font */
        body {
            font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #1a1c1e 0%, #0c0d0f 100%);
        }

        /* Brand textos */
        #textos .header-supertitle {
            margin: 0;
            font-size: 11.5px;
            font-weight: 500;
            letter-spacing: .4px;
            color: rgba(255, 255, 255, .50);
            line-height: 1;
        }

        #textos h1 {
            margin: 2px 0 0;
            font-size: 20px;
            font-weight: 800;
            letter-spacing: -.3px;
            line-height: 1;
        }

        #textos .brand-accent {
            color: var(--my-primary);
        }

        /* Help button */
        #btn-ayuda-sheet {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 38px;
            height: 38px;
            border-radius: var(--my-radius-sm);
            border: 1px solid var(--my-glass-rim);
            background: var(--my-glass);
            transition: background .18s ease;
            flex-shrink: 0;
        }

        #btn-ayuda-sheet:hover {
            background: var(--my-glass-hover);
        }

        #btn-ayuda-sheet:active {
            transform: scale(0.96);
        }

        #btn-ayuda-sheet img {
            width: 20px;
            height: 20px;
            opacity: .85;
        }

        /* User pill */
        #usuario {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 6px 14px 6px 6px;
            border-radius: var(--my-radius-pill);
            border: 1px solid var(--my-glass-rim);
            background: var(--my-glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: background .18s ease;
            min-width: 0;
            max-width: 52vw;
            text-decoration: none;
        }

        #usuario:hover {
            background: var(--my-glass-hover);
        }

        #usuario:active {
            transform: scale(0.97);
        }

        #icono_usuario {
            width: 32px;
            height: 32px;
            border-radius: var(--my-radius-pill);
            border: 1.5px solid rgba(255, 255, 255, 0.18);
            object-fit: cover;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.10);
        }

        .header-user-text {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 1px;
            min-width: 0;
        }

        #welcome_msg {
            margin: 0;
            font-size: 11px;
            font-weight: 500;
            color: rgba(255, 255, 255, .50);
            line-height: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 32vw;
        }

        #username {
            font-size: 13px;
            font-weight: 700;
            color: rgba(255, 255, 255, .92);
            line-height: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 32vw;
        }

        /* Right slot in header */
        .header-actions {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }
        /* ── MAIN / sections ────────────────────────────────────────── */
        .pt-plan-page {
            background: transparent;
            border: none;
            box-shadow: none;
            border-radius: 0;
            margin: 0px;
        }

        /* Plan topbar */
        .plan-topbar {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 14px;
        }

        .plan-title {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -.3px;
            color: rgba(255, 255, 255, .95);
            margin: 0;
        }

        /* Action pill container */
        .plan-actions-pill {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Main generate button */
        #boton_ejercicios,
        #boton_alimentacion {
            min-height: 38px;
            padding: 8px 16px;
            border-radius: var(--my-radius-sm);
            border: 1px solid var(--my-primary-rim);
            background: var(--my-primary-dim);
            color: var(--my-primary);
            font-family: inherit;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: .1px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            transition: background .18s ease, transform .12s ease;
        }

        @media (hover: hover) {

            #boton_ejercicios:hover,
            #boton_alimentacion:hover {
                background: rgba(208, 188, 255, .22);
            }
        }

        #boton_ejercicios:active,
        #boton_alimentacion:active {
            transform: scale(0.97);
        }

        /* Redo button (regenerar) */
        #boton_regenerar,
        #boton_regenerar_alim {
            width: 38px;
            height: 38px;
            padding: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--my-radius-sm);
            border: 1px solid var(--my-glass-rim);
            background: var(--my-glass);
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            transition: background .18s ease, transform .12s ease;
        }

        @media (hover: hover) {

            #boton_regenerar:hover,
            #boton_regenerar_alim:hover {
                background: var(--my-glass-hover);
            }
        }

        #boton_regenerar:active,
        #boton_regenerar_alim:active {
            transform: scale(0.96);
        }

        #boton_regenerar img,
        #boton_regenerar_alim img {
            width: 18px;
            height: 18px;
            opacity: .85;
        }

        /* Delete button */
        #boton_eliminar,
        #boton_eliminar_alim {
            width: 38px;
            height: 38px;
            padding: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--my-radius-sm);
            border: 1px solid var(--my-danger-rim);
            background: var(--my-danger-dim);
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            transition: background .18s ease, transform .12s ease;
        }

        @media (hover: hover) {

            #boton_eliminar:hover,
            #boton_eliminar_alim:hover {
                background: rgba(242, 184, 181, .18);
            }
        }

        #boton_eliminar:active,
        #boton_eliminar_alim:active {
            transform: scale(0.96);
        }

        #boton_eliminar img,
        #boton_eliminar_alim img {
            width: 18px;
            height: 18px;
            filter: invert(80%) sepia(20%) saturate(800%) hue-rotate(310deg);
            opacity: .90;
        }

        /* Description text */
        .descripcion_previa {
            font-size: 13.5px;
            line-height: 1.6;
            color: rgba(255, 255, 255, .60);
            margin: 0 0 14px;
            padding: 14px 16px;
            border-radius: var(--my-radius-sm);
            border: 1px solid var(--my-glass-rim);
            background: var(--my-glass);
        }

        /* ── FOOTER NAV ─────────────────────────────────────────────── */
        footer {
            margin-top: 40px;
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(20px) saturate(140%);
            -webkit-backdrop-filter: blur(20px) saturate(140%);
            border-top: 1px solid var(--my-glass-rim);
        }
        /* Generic footer button reset */
        .footer-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 0;
            border: none;
            background: transparent;
            text-decoration: none;
            cursor: pointer;
            flex: 0 0 auto;
            max-width: 90px;
            transition: opacity .15s ease;
        }

        .footer-btn:active {
            opacity: .72;
            transform: scale(0.96);
        }

        /* Icon wrapper */
        .footer-btn-icon {
            width: 48px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--my-radius-sm);
            transition: background .18s ease;
        }

        .footer-btn-icon img,
        .footer-btn-icon svg {
            width: 22px;
            height: 22px;
            opacity: .55;
            display: block;
            transition: opacity .18s ease;
        }

        /* Label */
        .footer-btn-label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: .3px;
            color: rgba(255, 255, 255, .45);
            line-height: 1;
            transition: color .18s ease;
        }

        /* Active state */
        .footer-btn.is-active .footer-btn-icon {
            background: rgba(255, 255, 255, 0.10);
        }

        .footer-btn.is-active .footer-btn-icon img,
        .footer-btn.is-active .footer-btn-icon svg {
            opacity: 1;
            filter: none;
        }

        .footer-btn.is-active .footer-btn-label {
            color: rgba(255, 255, 255, 0.90);
        }

        /* Profile special item: show avatar + name side-by-side */
        .footer-btn--profile {
            flex-direction: row;
            align-items: center;
            gap: 8px;
            justify-content: flex-start;
            padding: 4px 10px 4px 4px;
            border-radius: var(--my-radius-pill);
            border: 1px solid var(--my-glass-rim);
            background: var(--my-glass);
            max-width: 160px;
            flex: 0 0 auto;
            text-decoration: none;
        }

        .footer-btn--profile:hover {
            background: var(--my-glass-hover);
        }

        .footer-profile-avatar {
            width: 32px;
            height: 32px;
            border-radius: var(--my-radius-pill);
            border: 1.5px solid rgba(255, 255, 255, 0.18);
            object-fit: cover;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.10);
        }

        .footer-profile-text {
            display: flex;
            flex-direction: column;
            gap: 1px;
            min-width: 0;
        }

        .footer-profile-name {
            margin: 0;
            font-size: 12px;
            font-weight: 700;
            color: rgba(255, 255, 255, .88);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 80px;
        }

        .footer-profile-sub {
            font-size: 10px;
            font-weight: 500;
            color: rgba(255, 255, 255, .45);
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
</head>
