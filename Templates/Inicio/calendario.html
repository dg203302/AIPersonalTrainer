<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="/Scripts/ui_transparencia_apply.js"></script>
    <script src="/Scripts/ui_idioma.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/Styles/styles_dashboard.css">
    <link rel="stylesheet" href="/Styles/styles_ayuda.css">
    <meta name="theme-color" content="#0c0d0f">
    <title data-i18n-en="Calendar">Calendario</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7232324434042202"
        crossorigin="anonymous"></script>

    <style>
        section{
            background: transparent !important;
        }
        * {
            -webkit-tap-highlight-color: transparent !important;
            -webkit-tap-highlight-color: rgba(0,0,0,0) !important;
            outline: none !important;
        }

        *:focus {
            outline: none !important;
        }
        /* ── Material You override layer (Dashboard only) ───────────── */
        :root {
            --my-primary: #bce4ff;
            --my-primary-dim: rgba(208, 188, 255, 0.14);
            --my-primary-rim: rgba(208, 188, 255, 0.22);
            --my-danger: #f2b8b5;
            --my-danger-dim: rgba(242, 184, 181, 0.10);
            --my-danger-rim: rgba(242, 184, 181, 0.22);
            --my-glass: rgba(255, 255, 255, 0.05);
            --my-glass-rim: rgba(255, 255, 255, 0.10);
            --my-glass-hover: rgba(255, 255, 255, 0.08);
            --my-radius-card: 26px;
            --my-radius-sm: 16px;
            --my-radius-pill: 999px;
        }
        main{
            margin: 0px;
            padding: 24px 16px;
        }

        /* Hacer que el calendario ocupe el alto disponible (móvil y escritorio) */
        html, body { height: 100%; }

        /* Desktop / tablet: dar al calendario una altura mínima que llene la ventana
           restando header/footer (ajustable por variables CSS). */
        #calendario {
            min-height: calc(100vh - var(--header-fixed, 56px) - var(--footer-fixed, 56px) - 48px);
            height: auto;
            overflow: auto;
            border-radius: var(--my-radius-sm);
            border: 1px solid var(--my-glass-rim);
            background: var(--my-glass);
            padding: 8px;
        }

        @media (max-width: 900px) {
            main {
                padding: 12px 12px;
                min-height: calc(100vh - var(--header-fixed, 56px) - var(--footer-fixed, 56px));
                display: flex;
                flex-direction: column;
            }

            #calendario {
                flex: 1 1 auto;
                height: 100%;
                min-height: 0;
                overflow: auto;
                border-radius: var(--my-radius-sm);
                border: 1px solid var(--my-glass-rim);
                background: var(--my-glass);
                padding: 8px;
            }

            /* Asegurar que FullCalendar y sus contenedores internos se estiren */
            .fc, .fc .fc-view-harness, .fc-scroller {
                height: 100% !important;
                min-height: 0 !important;
            }
        }
        /* Font */
        body {
            font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #1a1c1e 0%, #0c0d0f 100%);
        }

        /* Brand textos */
        #textos .header-supertitle {
            margin: 0;
            font-size: 11.5px;
            font-weight: 500;
            letter-spacing: .4px;
            color: rgba(255, 255, 255, .50);
            line-height: 1;
        }

        #textos h1 {
            margin: 2px 0 0;
            font-size: 20px;
            font-weight: 800;
            letter-spacing: -.3px;
            line-height: 1;
        }

        #textos .brand-accent {
            color: var(--my-primary);
        }

        /* Help button */
        #btn-ayuda-sheet {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 38px;
            height: 38px;
            border-radius: var(--my-radius-sm);
            border: 1px solid var(--my-glass-rim);
            background: var(--my-glass);
            transition: background .18s ease;
            flex-shrink: 0;
        }

        #btn-ayuda-sheet:hover {
            background: var(--my-glass-hover);
        }

        #btn-ayuda-sheet:active {
            transform: scale(0.96);
        }

        #btn-ayuda-sheet img {
            width: 20px;
            height: 20px;
            opacity: .85;
        }

        /* User pill */
        #usuario {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 6px 14px 6px 6px;
            border-radius: var(--my-radius-pill);
            border: 1px solid var(--my-glass-rim);
            background: var(--my-glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: background .18s ease;
            min-width: 0;
            max-width: 52vw;
            text-decoration: none;
        }

        #usuario:hover {
            background: var(--my-glass-hover);
        }

        #usuario:active {
            transform: scale(0.97);
        }

        #icono_usuario {
            width: 32px;
            height: 32px;
            border-radius: var(--my-radius-pill);
            border: 1.5px solid rgba(255, 255, 255, 0.18);
            object-fit: cover;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.10);
        }

        .header-user-text {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 1px;
            min-width: 0;
        }

        #welcome_msg {
            margin: 0;
            font-size: 11px;
            font-weight: 500;
            color: rgba(255, 255, 255, .50);
            line-height: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 32vw;
        }

        #username {
            font-size: 13px;
            font-weight: 700;
            color: rgba(255, 255, 255, .92);
            line-height: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 32vw;
        }

        /* Right slot in header */
        .header-actions {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }
        /* ── MAIN / sections ────────────────────────────────────────── */
        .pt-plan-page {
            background: transparent;
            border: none;
            box-shadow: none;
            border-radius: 0;
            margin: 0px;
        }

        /* Plan topbar */
        .plan-topbar {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 14px;
        }

        .plan-title {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -.3px;
            color: rgba(255, 255, 255, .95);
            margin: 0;
        }

        /* Action pill container */
        .plan-actions-pill {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Main generate button */
        #boton_ejercicios,
        #boton_alimentacion {
            min-height: 38px;
            padding: 8px 16px;
            border-radius: var(--my-radius-sm);
            border: 1px solid var(--my-primary-rim);
            background: var(--my-primary-dim);
            color: var(--my-primary);
            font-family: inherit;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: .1px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            transition: background .18s ease, transform .12s ease;
        }

        @media (hover: hover) {

            #boton_ejercicios:hover,
            #boton_alimentacion:hover {
                background: rgba(208, 188, 255, .22);
            }
        }

        #boton_ejercicios:active,
        #boton_alimentacion:active {
            transform: scale(0.97);
        }

        /* Redo button (regenerar) */
        #boton_regenerar,
        #boton_regenerar_alim {
            width: 38px;
            height: 38px;
            padding: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--my-radius-sm);
            border: 1px solid var(--my-glass-rim);
            background: var(--my-glass);
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            transition: background .18s ease, transform .12s ease;
        }

        @media (hover: hover) {

            #boton_regenerar:hover,
            #boton_regenerar_alim:hover {
                background: var(--my-glass-hover);
            }
        }

        #boton_regenerar:active,
        #boton_regenerar_alim:active {
            transform: scale(0.96);
        }

        #boton_regenerar img,
        #boton_regenerar_alim img {
            width: 18px;
            height: 18px;
            opacity: .85;
        }

        /* Delete button */
        #boton_eliminar,
        #boton_eliminar_alim {
            width: 38px;
            height: 38px;
            padding: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--my-radius-sm);
            border: 1px solid var(--my-danger-rim);
            background: var(--my-danger-dim);
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            transition: background .18s ease, transform .12s ease;
        }

        @media (hover: hover) {

            #boton_eliminar:hover,
            #boton_eliminar_alim:hover {
                background: rgba(242, 184, 181, .18);
            }
        }

        #boton_eliminar:active,
        #boton_eliminar_alim:active {
            transform: scale(0.96);
        }

        #boton_eliminar img,
        #boton_eliminar_alim img {
            width: 18px;
            height: 18px;
            filter: invert(80%) sepia(20%) saturate(800%) hue-rotate(310deg);
            opacity: .90;
        }

        /* Description text */
        .descripcion_previa {
            font-size: 13.5px;
            line-height: 1.6;
            color: rgba(255, 255, 255, .60);
            margin: 0 0 14px;
            padding: 14px 16px;
            border-radius: var(--my-radius-sm);
            border: 1px solid var(--my-glass-rim);
            background: var(--my-glass);
        }

        /* ── FOOTER NAV ─────────────────────────────────────────────── */
        footer {
            margin-top: 40px;
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(20px) saturate(140%);
            -webkit-backdrop-filter: blur(20px) saturate(140%);
            border-top: 1px solid var(--my-glass-rim);
        }
        /* Generic footer button reset */
        .footer-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 0;
            border: none;
            background: transparent;
            text-decoration: none;
            cursor: pointer;
            flex: 0 0 auto;
            max-width: 90px;
            transition: opacity .15s ease;
        }

        .footer-btn:active {
            opacity: .72;
            transform: scale(0.96);
        }

        /* Icon wrapper */
        .footer-btn-icon {
            width: 48px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--my-radius-sm);
            transition: background .18s ease;
        }

        .footer-btn-icon img,
        .footer-btn-icon svg {
            width: 22px;
            height: 22px;
            opacity: .55;
            display: block;
            transition: opacity .18s ease;
        }

        /* Label */
        .footer-btn-label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: .3px;
            color: rgba(255, 255, 255, .45);
            line-height: 1;
            transition: color .18s ease;
        }

        /* Active state */
        .footer-btn.is-active .footer-btn-icon {
            background: rgba(255, 255, 255, 0.10);
        }

        .footer-btn.is-active .footer-btn-icon img,
        .footer-btn.is-active .footer-btn-icon svg {
            opacity: 1;
            filter: none;
        }

        .footer-btn.is-active .footer-btn-label {
            color: rgba(255, 255, 255, 0.90);
        }

        /* Profile special item: show avatar + name side-by-side */
        .footer-btn--profile {
            flex-direction: row;
            align-items: center;
            gap: 8px;
            justify-content: flex-start;
            padding: 4px 10px 4px 4px;
            border-radius: var(--my-radius-pill);
            border: 1px solid var(--my-glass-rim);
            background: var(--my-glass);
            max-width: 160px;
            flex: 0 0 auto;
            text-decoration: none;
        }

        .footer-btn--profile:hover {
            background: var(--my-glass-hover);
        }

        .footer-profile-avatar {
            width: 32px;
            height: 32px;
            border-radius: var(--my-radius-pill);
            border: 1.5px solid rgba(255, 255, 255, 0.18);
            object-fit: cover;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.10);
        }

        .footer-profile-text {
            display: flex;
            flex-direction: column;
            gap: 1px;
            min-width: 0;
        }

        .footer-profile-name {
            margin: 0;
            font-size: 12px;
            font-weight: 700;
            color: rgba(255, 255, 255, .88);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 80px;
        }

        .footer-profile-sub {
            font-size: 10px;
            font-weight: 500;
            color: rgba(255, 255, 255, .45);
        }
        /* Estadísticas (tarjetas) */
        .pt-stats {
            margin-top: 20px;
            padding: 14px;
            border-radius: var(--my-radius-sm);
            border: 1px solid var(--my-glass-rim);
            background:
                radial-gradient(140% 80% at 0% 0%, rgba(188, 228, 255, 0.12), transparent 60%),
                linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.015));
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
            position: relative;
        }

        .pt-stats-title {
            margin: 0 0 12px 0;
            font-size: 18px;
            font-weight: 800;
            color: rgba(255,255,255,0.9);
            letter-spacing: .2px;
        }

        /* ── Chart swipe carousel ─────────────────────────── */
        .pt-charts-swipe {
            display: flex;
            flex-direction: row;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            width: 100%;
            max-width: 100%;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
            margin-bottom: 12px;
        }
        .pt-charts-swipe::-webkit-scrollbar { display: none; }

        .pt-chart-panel {
            flex: 0 0 100%;
            min-width: 100%;
            scroll-snap-align: center;
            padding: 0 2px;
            box-sizing: border-box;
        }

        .pt-chart-card {
            border-radius: 14px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.09);
            padding: 14px 12px 12px;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .pt-chart-card-title {
            margin: 0 0 10px;
            font-size: 13px;
            font-weight: 800;
            color: rgba(255,255,255,0.72);
            letter-spacing: .3px;
            text-transform: uppercase;
        }

        .pt-chart-canvas-wrap {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 10;
        }
        .pt-chart-canvas-wrap canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* Donut needs square aspect ratio */
        .pt-chart-canvas-wrap--donut {
            aspect-ratio: 1 / 1;
            max-width: 240px;
            margin: 0 auto;
        }

        /* ── Dot indicators ───────────────────────────────── */
        .pt-charts-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 14px;
        }
        .pt-charts-dot {
            width: 8px;
            height: 8px;
            border-radius: 999px;
            background: rgba(255,255,255,0.18);
            border: none;
            padding: 0;
            cursor: pointer;
            transition: background .2s ease, transform .2s ease;
            box-shadow: none;
            min-height: 0;
        }
        .pt-charts-dot.is-active {
            background: var(--my-primary);
            transform: scale(1.25);
        }

        /* ── Empty state overlay ──────────────────────────── */
        .pt-stats-empty {
            position: absolute;
            inset: 0;
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 14px;
            border-radius: var(--my-radius-sm);
            background: rgba(12,13,15,0.88);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 32px 24px;
            text-align: center;
        }
        .pt-stats-empty-icon {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: rgba(188,228,255,0.08);
            border: 1px solid rgba(188,228,255,0.18);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pt-empty-pulse 2.4s ease-in-out infinite;
        }
        .pt-stats-empty-icon svg {
            width: 28px;
            height: 28px;
            stroke: var(--my-primary);
            opacity: .72;
        }
        @keyframes pt-empty-pulse {
            0%, 100% { transform: scale(1); opacity: .72; }
            50% { transform: scale(1.08); opacity: 1; }
        }
        .pt-stats-empty-title {
            font-size: 16px;
            font-weight: 800;
            color: rgba(255,255,255,0.88);
            margin: 0;
        }
        .pt-stats-empty-sub {
            font-size: 13px;
            font-weight: 500;
            color: rgba(255,255,255,0.48);
            margin: 0;
            max-width: 260px;
            line-height: 1.45;
        }

        .pt-stats-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
        }

        .pt-stat-group {
            grid-column: 1 / -1;
            margin: 4px 2px 0;
            font-size: 12px;
            font-weight: 800;
            letter-spacing: .7px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.58);
        }

        .pt-stat-card {
            padding: 12px 12px;
            border-radius: 14px;
            background: rgba(255,255,255,0.045);
            border: 1px solid rgba(255,255,255,0.09);
            color: rgba(255,255,255,0.92);
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-height: 94px;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            transition: transform .16s ease, border-color .16s ease, background .16s ease;
        }

        .pt-stat-card:active {
            transform: scale(0.98);
        }

        .pt-stat-key {
            font-size: 12px;
            color: rgba(255,255,255,0.68);
            font-weight: 700;
            line-height: 1.25;
        }

        .pt-stat-value {
            font-size: clamp(18px, 4.8vw, 22px);
            font-weight: 900;
            color: var(--my-primary);
            line-height: 1.12;
            word-break: break-word;
        }

        .pt-stat-card--primary .pt-stat-value {
            color: #bce4ff;
        }

        .pt-stat-card--performance .pt-stat-value {
            color: #9effcb;
        }

        .pt-stat-card--consistency .pt-stat-value {
            color: #ffdca2;
        }

        .pt-stat-card--progress .pt-stat-value {
            color: #f8b3ff;
        }

        .pt-stat-card--projection .pt-stat-value {
            color: #ffb9a8;
        }

        @media (max-width: 400px) {
            .pt-stats {
                margin-top: 14px;
                padding: 12px;
                border-radius: 14px;
            }

            .pt-stats-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 10px;
            }

            .pt-stat-group {
                margin-top: 6px;
                font-size: 11px;
            }

            .pt-stat-card {
                min-height: 88px;
                padding: 12px 12px;
            }

            .pt-stat-key {
                font-size: 11.5px;
            }

            .pt-stat-value {
                font-size: clamp(20px, 6vw, 24px);
            }
        }

    </style>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
</head>
<body>
    <header>
        <div>
        <!-- Help bottom-sheet trigger -->
        <!-- User profile pill -->
        <a id="usuario" href="/Templates/Inicio/perfil_usuario.html" aria-label="Ir a Perfil"
        data-i18n-en-aria-label="Go to profile" class="liquid-bar">
        <img src="https://www.gravatar.com/avatar/00000000000000000000000000000000?d=mp&f=y" alt="avatar"
        id="icono_usuario">
        <div class="header-user-text">
            <h2 id="welcome_msg">...</h2>
            <span id="username">...</span>
        </div>
        </a>
        <a id="btn-ayuda-sheet" aria-label="Ayuda"
        data-i18n-en-aria-label="Help" class="liquid-bar">
            <img src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyNCIgaGVpZ2h0PSIyNCIgdmlld0JveD0iMCAwIDI0IDI0IiBmaWxsPSJub25lIiBzdHJva2U9IiNmZmZmZmYiIHN0cm9rZS13aWR0aD0iMiIgc3Ryb2tlLWxpbmVjYXA9InJvdW5kIiBzdHJva2UtbGluZWpvaW49InJvdW5kIiBjbGFzcz0ibHVjaWRlIGx1Y2lkZS1jaXJjbGUtcXVlc3Rpb24tbWFyay1pY29uIGx1Y2lkZS1jaXJjbGUtcXVlc3Rpb24tbWFyayI+PGNpcmNsZSBjeD0iMTIiIGN5PSIxMiIgcj0iMTAiLz48cGF0aCBkPSJNOS4wOSA5YTMgMyAwIDAgMSA1LjgzIDFjMCAyLTMgMy0zIDMiLz48cGF0aCBkPSJNMTIgMTdoLjAxIi8+PC9zdmc+"
            alt="" aria-hidden="true">
            <span class="sr-only" data-i18n-en="Help">Ayuda</span>
        </a>
    </div>
    </header>

    <main>
        <h1 data-i18n-en="Calendar">Calendario</h1>
        <div id="calendario"></div>

        <!-- Estadísticas del mes -->
        <section id="estadisticas" class="pt-stats">
            <!-- Empty state overlay (hidden by default, shown by JS when no data) -->
            <div id="pt-stats-empty" class="pt-stats-empty" style="display:none;">
                <div class="pt-stats-empty-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M7 16l4-8 4 4 4-6"/></svg>
                </div>
                <p class="pt-stats-empty-title" data-i18n-en="No training data found">No se encontraron datos de entreno</p>
                <p class="pt-stats-empty-sub" data-i18n-en="Complete workouts from your training plan to see your statistics and charts here.">Completá entrenamientos desde tu plan de entreno para ver tus estadísticas y gráficos acá.</p>
            </div>

            <h2 class="pt-stats-title" data-i18n-en="Statistics">Estadísticas</h2>

            <!-- Chart carousel -->
            <div id="pt-charts-swipe" class="pt-charts-swipe">
                <!-- Panel 1: Bar chart — daily activity -->
                <div class="pt-chart-panel" data-chart-idx="0">
                    <div class="pt-chart-card">
                        <h3 class="pt-chart-card-title" data-i18n-en="Daily activity">Actividad diaria</h3>
                        <div class="pt-chart-canvas-wrap">
                            <canvas id="pt-chart-bar"></canvas>
                        </div>
                    </div>
                </div>
                <!-- Panel 2: Line chart — calorie/minute trend -->
                <div class="pt-chart-panel" data-chart-idx="1">
                    <div class="pt-chart-card">
                        <h3 class="pt-chart-card-title" data-i18n-en="Calorie trend">Tendencia de calorías</h3>
                        <div class="pt-chart-canvas-wrap">
                            <canvas id="pt-chart-line"></canvas>
                        </div>
                    </div>
                </div>
                <!-- Panel 3: Donut chart — active vs rest -->
                <div class="pt-chart-panel" data-chart-idx="2">
                    <div class="pt-chart-card">
                        <h3 class="pt-chart-card-title" data-i18n-en="Active vs rest days">Días activos vs descanso</h3>
                        <div class="pt-chart-canvas-wrap pt-chart-canvas-wrap--donut">
                            <canvas id="pt-chart-donut"></canvas>
                        </div>
                    </div>
                </div>
            </div>
            <!-- Dot indicators -->
            <div id="pt-charts-dots" class="pt-charts-dots">
                <button class="pt-charts-dot is-active" data-dot="0" aria-label="Chart 1"></button>
                <button class="pt-charts-dot" data-dot="1" aria-label="Chart 2"></button>
                <button class="pt-charts-dot" data-dot="2" aria-label="Chart 3"></button>
            </div>

            <div id="pt-stats-grid" class="pt-stats-grid">
                <!-- Las tarjetas de estadísticas se renderizan dinámicamente desde Scripts/script_calendario.js -->
            </div>
        </section>
    </main>

    <script>
        (function () {
            var btn = document.getElementById('btn-ayuda-sheet');
            if (!btn) return;
            btn.addEventListener('click', function (e) {
                e.preventDefault();
                if (!window.PTBottomSheet) return;

                var ayudaHTML = [
                    '<div class="ayuda-sheet-wrap">',

                    /* ── Índice ─────────────────────────────────────────── */
                    '<section class="ayuda-box" aria-labelledby="sh_ayuda_indice_title">',
                    '  <div class="ayuda-header">',
                    '    <div class="ayuda-title">',
                    '      <h1 id="sh_ayuda_indice_title">Índice</h1>',
                    '      <p class="ayuda-subtitle">Ir a una sección</p>',
                    '    </div>',
                    '    <span class="ayuda-chip">Ayuda</span>',
                    '  </div>',
                    '  <div class="ayuda-content">',
                    '    <nav aria-label="Índice de ayuda">',
                    '      <ul>',
                    '        <li><a href="#sh-ayuda-calendario">Usando el Calendario</a></li>',
                    '        <li><a href="#sh-ayuda-estadisticas">Entender Estadísticas</a></li>',
                    '        <li><a href="#sh-ayuda-registros">Gestionar Registros</a></li>',
                    '      </ul>',
                    '    </nav>',
                    '    <p class="ayuda-note">El calendario es tu herramienta para rastrear tus entrenamientos completados, ver calorías quemadas y analizar tu progreso a lo largo del tiempo.</p>',
                    '  </div>',
                    '</section>',

                    /* ── Guía Calendario ────────────────────────────────── */
                    '<section id="sh-ayuda-calendario" class="ayuda-box" aria-labelledby="sh_ayuda_title">',
                    '  <div class="ayuda-header">',
                    '    <div class="ayuda-title">',
                    '      <h1 id="sh_ayuda_title">Usando el Calendario</h1>',
                    '      <p class="ayuda-subtitle">Rastrear y gestionar entrenamientos</p>',
                    '    </div>',
                    '    <span class="ayuda-chip">Guía</span>',
                    '  </div>',
                    '  <div class="ayuda-content">',
                    '    <p>El calendario te permite ver todos tus entrenamientos completados, rastrear calorías quemadas y analizar tu consistencia a lo largo del tiempo.</p>',
                    '    <div class="ayuda-grid" role="list">',
                    '      <div class="ayuda-card" role="listitem"><h4>Qué ves</h4><p>Entrenamientos completados en el calendario con calorías e información del entrenamiento.</p></div>',
                    '      <div class="ayuda-card" role="listitem"><h4>Estados</h4><p>Cada evento muestra su estado (completado/pendiente) con un indicador de color.</p></div>',
                    '    </div>',
                    '    <div class="ayuda-divider" aria-hidden="true"></div>',
                    '    <h2>1) Ver entrenamientos en el calendario</h2>',
                    '    <ul>',
                    '      <li>El calendario muestra todos los meses. Navegá entre meses usando los controles de arriba.</li>',
                    '      <li>Cada <strong>punto o evento</strong> en el calendario representa un entrenamiento completado.</li>',
                    '      <li>Los eventos muestran:',
                    '        <ul>',
                    '          <li><strong>Calorías quemadas</strong> (si están registradas).</li>',
                    '          <li><strong>Indicador de estado</strong>: punto verde para completados, azul para otros.</li>',
                    '        </ul>',
                    '      </li>',
                    '    </ul>',
                    '    <h2>2) Ver detalle de un día</h2>',
                    '    <ul>',
                    '      <li>Tocá/clickeá en <strong>cualquier fecha</strong> del calendario para ver el detalle de ese día.</li>',
                    '      <li>También podés clickear en un <strong>evento específico</strong> (entrenamiento) para ver su información.</li>',
                    '      <li>Se abrirá un <strong>panel emergente</strong> con:',
                    '        <ul>',
                    '          <li><strong>Fecha</strong>: día seleccionado.</li>',
                    '          <li><strong>Entrenamientos completados</strong>: lista de todos los entrenamientos de ese día.</li>',
                    '          <li><strong>Detalles de cada entrenamiento</strong>: estado, calorías, tiempo total, hora de confirmación.</li>',
                    '        </ul>',
                    '      </li>',
                    '    </ul>',
                    '    <h2>3) Información de cada entrenamiento</h2>',
                    '    <ul>',
                    '      <li><strong>Título</strong>: nombre del entrenamiento (ej: "Pecho y Tríceps").</li>',
                    '      <li><strong>Estado</strong>: completado o en progreso.</li>',
                    '      <li><strong>Calorías</strong>: calorías estimadas quemadas durante el entrenamiento.</li>',
                    '      <li><strong>Tiempo</strong>: duración total del entrenamiento en minutos.</li>',
                    '      <li><strong>Hora</strong>: hora en que se confirmó el entrenamiento.</li>',
                    '      <li><strong>Descripción</strong>: notas adicionales sobre el entrenamiento (si existen).</li>',
                    '    </ul>',
                    '    <div class="ayuda-divider" aria-hidden="true"></div>',
                    '    <h2>4) Eliminar registros</h2>',
                    '    <ul>',
                    '      <li>En el detalle de cada entrenamiento, hay un botón <strong>"Limpiar registro"</strong>.</li>',
                    '      <li>Al presionarlo, se te pedirá confirmación antes de eliminar el registro.</li>',
                    '      <li>Una vez eliminado, el entrenamiento desaparecerá del calendario.</li>',
                    '      <li>Este cambio se sincronizará con tu perfil automáticamente.</li>',
                    '    </ul>',
                    '    <p class="ayuda-note">Atajo: tocá tu <strong>Perfil</strong> en el header para ir directamente a tu página de perfil.</p>',
                    '  </div>',
                    '</section>',
                    /* ── Entender Estadísticas ──────────────────────────── */,
                    '<section id="sh-ayuda-estadisticas" class="ayuda-box" aria-labelledby="sh_ayuda_stats_title">',
                    '  <div class="ayuda-header">',
                    '    <div class="ayuda-title">',
                    '      <h1 id="sh_ayuda_stats_title">Entender Estadísticas</h1>',
                    '      <p class="ayuda-subtitle">Métricas de tu progreso</p>',
                    '    </div>',
                    '    <span class="ayuda-chip">Análisis</span>',
                    '  </div>',
                    '  <div class="ayuda-content">',
                    '    <p>Las estadísticas te muestran un resumen de tu desempeño durante el mes actual, ayudándote a evaluar tu consistencia y progreso.</p>',
                    '    <div class="ayuda-divider" aria-hidden="true"></div>',
                    '    <h2>1) Métricas principales</h2>',
                    '    <ul>',
                    '      <li><strong>Total de entrenamientos (mes)</strong>: cantidad de entrenamientos completados en el mes actual.</li>',
                    '      <li><strong>Total de calorías (mes)</strong>: suma total de calorías quemadas en todos tus entrenamientos del mes.</li>',
                    '      <li><strong>Promedio diario de calorías</strong>: calorías promedio por día (total del mes ÷ días activos).</li>',
                    '      <li><strong>Consistencia</strong>: racha de días consecutivos con entrenamientos (útil para ver tu disciplina).</li>',
                    '      <li><strong>Performance</strong>: evaluación de cómo te ha ido este mes comparado con tu capacidad.</li>',
                    '      <li><strong>Proyección</strong>: estimación de tus calorías totales si mantienes el ritmo actual hasta fin de mes.</li>',
                    '    </ul>',
                    '    <div class="ayuda-divider" aria-hidden="true"></div>',
                    '    <h2>2) Cómo leer las tarjetas de estadísticas</h2>',
                    '    <ul>',
                    '      <li>Cada <strong>tarjeta</strong> muestra una métrica diferente.</li>',
                    '      <li>El <strong>número grande</strong> es el valor principal de la métrica.</li>',
                    '      <li>El <strong>color</strong> de cada tarjeta ayuda a identificar el tipo de métrica:',
                    '        <ul>',
                    '          <li><strong>Azul claro</strong>: métricas principales (entrenamientos, calorías).</li>',
                    '          <li><strong>Verde</strong>: performance (desempeño).</li>',
                    '          <li><strong>Naranja</strong>: consistencia (racha de días).</li>',
                    '          <li><strong>Rosa/Morado</strong>: progreso (proyecciones).</li>',
                    '        </ul>',
                    '      </li>',
                    '    </ul>',
                    '    <h2>3) Consejos para mejorar tus métricas</h2>',
                    '    <ul>',
                    '      <li><strong>Aumentar entrenamientos</strong>: intenta entrenar más días a la semana.</li>',
                    '      <li><strong>Mejorar intensidad</strong>: entrenamientos más intensos queman más calorías.</li>',
                    '      <li><strong>Mantener consistencia</strong>: una racha larga de días consecutivos es muy motivante.</li>',
                    '      <li><strong>Revisar proyecciones</strong>: si tu proyección es baja, acelera el ritmo para lograr tus metas.</li>',
                    '    </ul>',
                    '  </div>',
                    '</section>',

                    /* ── Gestionar Registros ───────────────────────────── */
                    '<section id="sh-ayuda-registros" class="ayuda-box" aria-labelledby="sh_ayuda_reg_title">',
                    '  <div class="ayuda-header">',
                    '    <div class="ayuda-title">',
                    '      <h1 id="sh_ayuda_reg_title">Gestionar Registros</h1>',
                    '      <p class="ayuda-subtitle">Editar y eliminar entrenamientos</p>',
                    '    </div>',
                    '    <span class="ayuda-chip">Gestión</span>',
                    '  </div>',
                    '  <div class="ayuda-content">',
                    '    <p>Los registros de entrenamientos son la base de tu calendario y estadísticas. Acá te mostramos cómo gestionar tus datos.</p>',
                    '    <div class="ayuda-divider" aria-hidden="true"></div>',
                    '    <h2>1) Cómo se generan los registros</h2>',
                    '    <ul>',
                    '      <li>Los registros se crean automáticamente cuando <strong>completás un entrenamiento</strong> desde tu plan de ejercicio.</li>',
                    '      <li>Se sincronizan con tu perfil automáticamente.</li>',
                    '      <li>Cada registro contiene: calorías estimadas, tiempo total, hora de confirmación, estado.</li>',
                    '    </ul>',
                    '    <h2>2) Eliminar un registro</h2>',
                    '    <ol>',
                    '      <li>Abrí el calendario y hacé click en la fecha del entrenamiento.</li>',
                    '      <li>Se abrirá un panel con los detalles de ese día.</li>',
                    '      <li>En cada entrenamiento, encontrarás el botón <strong>"Limpiar registro"</strong>.</li>',
                    '      <li>Presioná el botón y <strong>confirma</strong> la eliminación.</li>',
                    '      <li>El registro desaparecerá del calendario y las estadísticas se actualizarán automáticamente.</li>',
                    '    </ol>',
                    '    <div class="ayuda-divider" aria-hidden="true"></div>',
                    '    <h2>3) Sincronización automática</h2>',
                    '    <ul>',
                    '      <li>Todos los cambios (agregar o eliminar registros) se guardan en tu base de datos automáticamente.</li>',
                    '      <li>Si desconectás y te conectás de nuevo, tus datos estarán sincronizados.</li>',
                    '      <li>Las estadísticas se recalculan automáticamente con cada cambio.</li>',
                    '    </ul>',
                    '    <h2>4) Solución de problemas</h2>',
                    '    <ul>',
                    '      <li><strong>No veo mis entrenamientos</strong>: recargá la página o sincronizá desde tu perfil.</li>',
                    '      <li><strong>Registro no se elimina</strong>: comprobá tu conexión a internet e intentá de nuevo.</li>',
                    '      <li><strong>Estadísticas incorrectas</strong>: recargá la página para actualizar.</li>',
                    '    </ul>',
                    '    <p class="ayuda-note">Tip: Revisá tu calendario regularmente para ver tu progreso y mantente motivado.</p>',
                    '  </div>',
                    '</section>',

                    '</div>'
                ].join('\n');

                window.PTBottomSheet.open({
                    title: 'Ayuda',
                    subtitle: 'Personal TrAIner',
                    html: ayudaHTML,
                    showClose: false,
                    showHandle: true,
                    allowOutsideClose: true,
                    allowEscapeClose: true,
                    allowDragClose: true,
                    className: 'pt-sheet--ayuda',
                    didOpen: function (sheet) {
                        var content = sheet.querySelector('.pt-sheet-content');
                        if (!content) return;
                        sheet.querySelectorAll('a[href^="#sh-"]').forEach(function (link) {
                            link.addEventListener('click', function (ev) {
                                ev.preventDefault();
                                var target = content.querySelector(link.getAttribute('href'));
                                if (target) {
                                    content.scrollTo({ top: target.offsetTop - 12, behavior: 'smooth' });
                                }
                            });
                        });
                    }
                });
            });
        }());
    </script>
</body>
